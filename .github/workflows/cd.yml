name: cd

on:
  push:
    branches: [main]

jobs:
  tests:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Install goose
        uses: mscno/setup-goose@v1
        with:
          version: "3.27.1"

      - name: Build the app
        run: ./scripts/buildprod.sh

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'
      
      - name: Build and push image to Artifact Registry
        run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-498522/notely-ar-repo/znseaman/notely:latest

      - name: Migrate database
        run: ./scripts/migrateup.sh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-498522/notely-ar-repo/znseaman/notely:latest --region us-central1 --allow-unauthenticated --project notely-498522 --max-instances=4
